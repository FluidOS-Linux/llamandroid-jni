name: Build llama.cpp + JNI for Android ARM64 (fat .so)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggerganov/llama.cpp
          ref: master

      - name: Download llama_jni.cpp from your repo
        run: |
          curl -fsSL https://raw.githubusercontent.com/FluidOS-Linux/llamandroid-jni/main/llama_jni.cpp -o llama_jni.cpp

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: echo "y" | sdkmanager "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Build llama.cpp static libs + fat JNI .so for Android ARM64
        run: |
          export ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/26.3.11579264
          export TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
          export CXX=$TOOLCHAIN/bin/aarch64-linux-android28-clang++
          export SYSROOT=$TOOLCHAIN/sysroot

          # ── Explicit aarch64 libc++ paths (no find, no wrong arch) ──────────
          export LIBCXX=$SYSROOT/usr/lib/aarch64-linux-android/libc++_static.a
          export LIBCXXABI=$SYSROOT/usr/lib/aarch64-linux-android/libc++abi.a

          echo "Checking libc++ paths:"
          ls -lh $LIBCXX $LIBCXXABI

          # ── Step 1: Build llama.cpp as STATIC libs ───────────────────────────
          mkdir build-android && cd build-android
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_CXX_FLAGS="-I../include -I../ggml/include"
          cmake --build . --config Release -j4
          cd ..

          # ── Step 2: Collect all static libs ─────────────────────────────────
          echo "Static libs found:"
          find build-android -name "*.a" | sort
          STATIC_LIBS=$(find build-android -name "*.a" | tr '\n' ' ')

          # ── Step 3: Compile fat libllamajni.so ──────────────────────────────
          mkdir -p output
          $CXX \
            -shared -fPIC \
            -nostdlib++ \
            -I./include \
            -I./ggml/include \
            -I$SYSROOT/usr/include \
            -I$SYSROOT/usr/include/aarch64-linux-android \
            llama_jni.cpp \
            -Wl,--whole-archive \
            $STATIC_LIBS \
            $LIBCXX \
            $LIBCXXABI \
            -Wl,--no-whole-archive \
            -llog -lm -lz -landroid -ldl -lc \
            -o output/libllamajni.so

          echo "✅ Fat .so built:"
          ls -lh output/libllamajni.so

          echo "Dependencies:"
          $TOOLCHAIN/bin/llvm-readelf -d output/libllamajni.so | grep NEEDED

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-android-arm64-fat-jni
          path: output/libllamajni.so
          retention-days: 30
